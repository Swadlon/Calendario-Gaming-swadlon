    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Calendar - Calendario de Juegos</title>
    <link rel="manifest" href="data:application/json,{\"name\":\"Gaming Calendar\",\"short_name\":\"GamingCal\",\"start_url\":\"/\",\"display\":\"standalone\",\"background_color\":\"#0a0e27\",\"theme_color\":\"#00d4ff\",\"icons\":[{\"src\":\"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%2300d4ff' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dominant-baseline='central' font-weight='bold'>GC</text></svg>\",\"sizes\":\"192x192\",\"type\":\"image/svg+xml\",\"purpose\":\"any\"}]}">
    <style>
        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --secondary: #ff006e;
            --bg-dark: #0a0e27;
            --bg-darker: #05070f;
            --surface: #1a1f3a;
            --surface-light: #252d52;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --accent-gold: #ffa500;
            --accent-purple: #9d4edd;
            --accent-green: #00f5a0;
            --border: #2a3050;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: rgba(26, 31, 58, 0.8);
            border-bottom: 2px solid var(--primary);
            padding: 20px 0;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                order: -1;
            }
        }

        /* Calendar Grid */
        .calendar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .calendar-header {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--surface-light);
            border-bottom: 2px solid var(--border);
        }

        .weekday {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            font-size: 14px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            padding: 10px;
            background: var(--border);
        }

        .day {
            background: var(--surface);
            padding: 12px 8px;
            min-height: 120px;
            cursor: pointer;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .day:hover {
            background: var(--surface-light);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .day-number {
            font-weight: bold;
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .day.other-month .day-number {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .day.today {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 0, 110, 0.1));
            border: 2px solid var(--primary);
        }

        .day-events {
            font-size: 11px;
            max-height: 80px;
            overflow-y: auto;
        }

        .event-tag {
            display: inline-block;
            padding: 2px 6px;
            margin: 2px 2px 2px 0;
            border-radius: 4px;
            background: var(--accent-purple);
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 10px;
            font-weight: bold;
            border-left: 3px solid var(--accent-gold);
        }

        .event-tag.release {
            background: #e74c3c;
            border-left-color: #c0392b;
        }

        .event-tag.event {
            background: var(--accent-green);
            color: #000;
            border-left-color: #00d084;
        }

        .event-tag.stream {
            background: #3498db;
            border-left-color: #2980b9;
        }

        .event-tag.tournament {
            background: var(--accent-gold);
            color: #000;
            border-left-color: #f39c12;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .quick-add {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .quick-add h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--primary);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-footer .btn {
            flex: 1;
        }

        /* Upcoming Events */
        .upcoming-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .upcoming-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .event-item {
            background: var(--surface-light);
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent-purple);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .event-item.release {
            border-left-color: #e74c3c;
        }

        .event-item.event {
            border-left-color: var(--accent-green);
        }

        .event-item.stream {
            border-left-color: #3498db;
        }

        .event-item.tournament {
            border-left-color: var(--accent-gold);
        }

        .event-item-content {
            flex: 1;
        }

        .event-item-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .event-item-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .event-item-actions {
            display: flex;
            gap: 5px;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--primary);
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
            animation: slideInRight 0.3s;
            z-index: 2000;
            max-width: 300px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left-color: var(--accent-green);
        }

        .notification.error {
            border-left-color: #e74c3c;
        }

        /* View Buttons */
        .view-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .view-btn {
            padding: 8px 16px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .view-btn.active {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-color: var(--primary);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .settings-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: var(--border);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .calendar-header {
                font-size: 18px;
                padding: 15px;
            }

            .day {
                min-height: 80px;
                padding: 8px 4px;
            }

            header h1 {
                font-size: 20px;
            }

            .header-controls {
                flex-direction: column;
                width: 100%;
            }

            .header-controls > * {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🎮 Gaming Calendar</h1>
            <div class="header-controls">
                <div class="view-buttons">
                    <button class="view-btn active" data-view="month">📅 Mes</button>
                    <button class="view-btn" data-view="list">📋 Lista</button>
                </div>
                <button class="settings-btn" id="enableNotifications">🔔 Activar Notificaciones</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <div id="calendarView" class="calendar">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button class="btn-nav" id="prevMonth">← Anterior</button>
                        <button class="btn-nav" id="todayBtn">Hoy</button>
                        <button class="btn-nav" id="nextMonth">Siguiente →</button>
                    </div>
                    <div id="monthYear"></div>
                </div>
                <div class="weekdays">
                    <div class="weekday">Lun</div>
                    <div class="weekday">Mar</div>
                    <div class="weekday">Mié</div>
                    <div class="weekday">Jue</div>
                    <div class="weekday">Vie</div>
                    <div class="weekday">Sáb</div>
                    <div class="weekday">Dom</div>
                </div>
                <div class="days" id="calendarDays"></div>
            </div>

            <div id="listView" style="display: none;">
                <div class="upcoming-section">
                    <h3>Próximos Eventos</h3>
                    <div id="eventsList"></div>
                </div>
            </div>

            <aside class="sidebar">
                <div class="quick-add">
                    <h3>➕ Añadir Evento</h3>
                    <form id="eventForm">
                        <div class="form-group">
                            <label for="eventName">Nombre del Evento</label>
                            <input type="text" id="eventName" placeholder="Ej: Elden Ring DLC" required>
                        </div>
                        <div class="form-group">
                            <label for="eventDate">Fecha</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label for="eventType">Tipo</label>
                            <select id="eventType" required>
                                <option value="">-- Selecciona tipo --</option>
                                <option value="release">🎮 Lanzamiento</option>
                                <option value="event">🎪 Evento In-Game</option>
                                <option value="stream">📡 Stream</option>
                                <option value="tournament">🏆 Torneo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="eventGame">Juego</label>
                            <input type="text" id="eventGame" placeholder="Ej: Final Fantasy VII">
                        </div>
                        <div class="form-group">
                            <label for="eventReminder">Recordatorio (horas antes)</label>
                            <select id="eventReminder">
                                <option value="0">Sin recordatorio</option>
                                <option value="1">1 hora</option>
                                <option value="24">1 día</option>
                                <option value="72">3 días</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Añadir Evento</button>
                    </form>
                </div>

                <div class="upcoming-section">
                    <h3>🎯 Próximos 7 días</h3>
                    <div id="upcomingEvents"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Modal para detalles del evento -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>Detalles del Evento</div>
                <button class="close-btn" onclick="closeEventModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEventModal()">Cerrar</button>
                <button class="btn btn-danger" id="deleteEventBtn">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
                self.addEventListener('push', event => {
                    const data = event.data?.json() || {};
                    self.registration.showNotification(data.title || 'Gaming Calendar', {
                        body: data.body,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%2300d4ff" width="192" height="192"/><text x="50%" y="50%" font-size="100" fill="white" text-anchor="middle" dominant-baseline="central" font-weight="bold">GC</text></svg>',
                        badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%2300d4ff" width="192" height="192"/></svg>',
                        tag: 'gaming-notification',
                        requireInteraction: true
                    });
                });
            `)).catch(err => console.log('SW registration failed:', err));
        }

        // App State
        const appState = {
            currentDate: new Date(),
            events: JSON.parse(localStorage.getItem('gamingEvents')) || [],
            view: 'month',
            selectedEventId: null
        };

        // DOM Elements
        const monthYearEl = document.getElementById('monthYear');
        const calendarDaysEl = document.getElementById('calendarDays');
        const eventForm = document.getElementById('eventForm');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');
        const todayBtn = document.getElementById('todayBtn');
        const enableNotificationsBtn = document.getElementById('enableNotifications');
        const viewBtns = document.querySelectorAll('.view-btn');

        // Initialize App
        function initApp() {
            renderCalendar();
            updateUpcomingEvents();
            attachEventListeners();
            checkReminders();
            setInterval(checkReminders, 60000); // Check every minute
        }

        // Event Listeners
        function attachEventListeners() {
            prevMonthBtn.addEventListener('click', () => {
                appState.currentDate.setMonth(appState.currentDate.getMonth() - 1);
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', () => {
                appState.currentDate.setMonth(appState.currentDate.getMonth() + 1);
                renderCalendar();
            });

            todayBtn.addEventListener('click', () => {
                appState.currentDate = new Date();
                renderCalendar();
            });

            eventForm.addEventListener('submit', handleAddEvent);

            viewBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    viewBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    appState.view = btn.dataset.view;
                    switchView();
                });
            });

            enableNotificationsBtn.addEventListener('click', requestNotificationPermission);
        }

        // Render Calendar
        function renderCalendar() {
            const year = appState.currentDate.getFullYear();
            const month = appState.currentDate.getMonth();

            // Update header
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                               'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            monthYearEl.textContent = `${monthNames[month]} ${year}`;

            // Clear calendar
            calendarDaysEl.innerHTML = '';

            // Get first day and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const dayEl = createDayElement(daysInPrevMonth - i, true);
                calendarDaysEl.appendChild(dayEl);
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEl = createDayElement(day, false);
                calendarDaysEl.appendChild(dayEl);
            }

            // Next month days
            const totalCells = calendarDaysEl.children.length;
            const remainingCells = 42 - totalCells;
            for (let day = 1; day <= remainingCells; day++) {
                const dayEl = createDayElement(day, true);
                calendarDaysEl.appendChild(dayEl);
            }
        }

        function createDayElement(day, otherMonth) {
            const dayEl = document.createElement('div');
            dayEl.className = 'day';

            if (otherMonth) {
                dayEl.classList.add('other-month');
            }

            const year = appState.currentDate.getFullYear();
            const month = appState.currentDate.getMonth();
            const currentDate = new Date(year, month, day);

            if (!otherMonth) {
                const today = new Date();
                if (currentDate.toDateString() === today.toDateString()) {
                    dayEl.classList.add('today');
                }
            }

            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = day;
            dayEl.appendChild(dayNumber);

            // Get events for this day
            const dateStr = currentDate.toISOString().split('T')[0];
            const dayEvents = appState.events.filter(e => e.date === dateStr);

            const eventsDiv = document.createElement('div');
            eventsDiv.className = 'day-events';
            dayEvents.forEach(event => {
                const tag = document.createElement('div');
                tag.className = `event-tag ${event.type}`;
                tag.textContent = event.name.substring(0, 12);
                tag.title = event.name;
                eventsDiv.appendChild(tag);
            });

            dayEl.appendChild(eventsDiv);

            if (!otherMonth) {
                dayEl.addEventListener('click', () => openDayModal(dateStr, dayEvents));
            }

            return dayEl;
        }

        // Handle Add Event
        function handleAddEvent(e) {
            e.preventDefault();

            const name = document.getElementById('eventName').value;
            const date = document.getElementById('eventDate').value;
            const type = document.getElementById('eventType').value;
            const game = document.getElementById('eventGame').value;
            const reminder = document.getElementById('eventReminder').value;

            if (!name || !date || !type) {
                showNotification('Por favor completa todos los campos requeridos', 'error');
                return;
            }

            const event = {
                id: Date.now(),
                name: `${name}${game ? ` (${game})` : ''}`,
                date,
                type,
                game,
                reminder: parseInt(reminder),
                created: new Date().toISOString()
            };

            appState.events.push(event);
            saveEvents();
            renderCalendar();
            updateUpcomingEvents();
            eventForm.reset();
            showNotification('✅ Evento añadido correctamente', 'success');

            // Schedule notification if reminder is set
            if (reminder > 0) {
                scheduleReminder(event);
            }
        }

        // Save Events to LocalStorage
        function saveEvents() {
            localStorage.setItem('gamingEvents', JSON.stringify(appState.events));
        }

        // Update Upcoming Events
        function updateUpcomingEvents() {
            const upcomingDiv = document.getElementById('upcomingEvents');
            const listDiv = document.getElementById('eventsList');
            upcomingDiv.innerHTML = '';
            listDiv.innerHTML = '';

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const nextWeek = new Date(today);
            nextWeek.setDate(nextWeek.getDate() + 7);

            const upcomingEvents = appState.events
                .filter(e => {
                    const eventDate = new Date(e.date);
                    return eventDate >= today && eventDate <= nextWeek;
                })
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            if (upcomingEvents.length === 0) {
                upcomingDiv.innerHTML = '<div class="empty-state">Sin eventos próximos 😴</div>';
                listDiv.innerHTML = '<div class="empty-state">Sin eventos 📭</div>';
            } else {
                upcomingEvents.forEach(event => {
                    const eventDate = new Date(event.date);
                    const dateStr = eventDate.toLocaleDateString('es-ES', { 
                        weekday: 'short', 
                        month: 'short', 
                        day: 'numeric' 
                    });

                    const itemEl = document.createElement('div');
                    itemEl.className = `event-item ${event.type}`;
                    itemEl.innerHTML = `
                        <div class="event-item-content">
                            <div class="event-item-title">${event.name}</div>
                            <div class="event-item-date">${dateStr}</div>
                        </div>
                        <div class="event-item-actions">
                            <button class="btn btn-small btn-secondary" onclick="deleteEvent(${event.id})">🗑️</button>
                        </div>
                    `;
                    upcomingDiv.appendChild(itemEl);
                    listDiv.appendChild(itemEl.cloneNode(true));
                });
            }
        }

        // Open Day Modal
        function openDayModal(dateStr, events) {
            const modal = document.getElementById('eventModal');
            const modalBody = document.getElementById('modalBody');
            const deleteBtn = document.getElementById('deleteEventBtn');

            const date = new Date(dateStr);
            const dateStr2 = date.toLocaleDateString('es-ES', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            if (events.length === 0) {
                modalBody.innerHTML = `
                    <p style="color: var(--text-secondary);">No hay eventos programados para ${dateStr2}</p>
                `;
                deleteBtn.style.display = 'none';
            } else {
                let html = `<p style="margin-bottom: 15px; color: var(--text-secondary);">${dateStr2}</p>`;
                events.forEach(event => {
                    html += `
                        <div style="background: var(--surface-light); padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid var(--primary);">
                            <div style="font-weight: bold; color: var(--text-primary); margin-bottom: 5px;">${event.name}</div>
                            <div style="font-size: 12px; color: var(--text-secondary);">
                                <div>Tipo: ${event.type}</div>
                                ${event.reminder > 0 ? `<div>Recordatorio: ${event.reminder}h antes</div>` : ''}
                            </div>
                            <button class="btn btn-small btn-danger" onclick="deleteEvent(${event.id}); closeEventModal();" style="margin-top: 8px;">Eliminar</button>
                        </div>
                    `;
                });
                modalBody.innerHTML = html;
                deleteBtn.style.display = 'block';
            }

            modal.classList.add('active');
        }

        // Close Event Modal
        function closeEventModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        // Delete Event
        function deleteEvent(id) {
            appState.events = appState.events.filter(e => e.id !== id);
            saveEvents();
            renderCalendar();
            updateUpcomingEvents();
            showNotification('🗑️ Evento eliminado', 'success');
        }

        // Switch View
        function switchView() {
            const calView = document.getElementById('calendarView');
            const listView = document.getElementById('listView');

            if (appState.view === 'month') {
                calView.style.display = 'block';
                listView.style.display = 'none';
            } else {
                calView.style.display = 'none';
                listView.style.display = 'block';
            }
        }

        // Notification System
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Request Notification Permission
        function requestNotificationPermission() {
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    showNotification('✅ Notificaciones ya activadas', 'success');
                } else if (Notification.permission !== 'denied') {
                    Notification.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            showNotification('✅ Notificaciones activadas', 'success');
                            localStorage.setItem('notificationsEnabled', 'true');
                        }
                    });
                }
            }
        }

        // Check Reminders and Send Notifications
        function checkReminders() {
            if (localStorage.getItem('notificationsEnabled') !== 'true') return;

            const now = new Date();
            appState.events.forEach(event => {
                if (event.reminder === 0) return;

                const eventDate = new Date(event.date);
                const reminderTime = new Date(eventDate.getTime() - (event.reminder * 60 * 60 * 1000));

                if (Math.abs(now - reminderTime) < 60000) { // Within 1 minute window
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification('🎮 Gaming Calendar', {
                            body: `⏰ Recordatorio: ${event.name} está en ${event.reminder} horas!`,
                            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%2300d4ff" width="192" height="192"/><text x="50%" y="50%" font-size="100" fill="white" text-anchor="middle" dominant-baseline="central" font-weight="bold">GC</text></svg>',
                            tag: `reminder-${event.id}`,
                            requireInteraction: true
                        });
                    }
                }
            });
        }

        // Schedule Reminder
        function scheduleReminder(event) {
            if (event.reminder === 0) return;

            const eventDate = new Date(event.date);
            const reminderTime = new Date(eventDate.getTime() - (event.reminder * 60 * 60 * 1000));
            const now = new Date();

            if (reminderTime > now) {
                const timeout = reminderTime - now;
                setTimeout(() => {
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification('🎮 Gaming Calendar', {
                            body: `⏰ Recordatorio: ${event.name}!`,
                            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%2300d4ff" width="192" height="192"/><text x="50%" y="50%" font-size="100" fill="white" text-anchor="middle" dominant-baseline="central" font-weight="bold">GC</text></svg>',
                            tag: `reminder-${event.id}`,
                            requireInteraction: true
                        });
                    }
                }, timeout);
            }
        }

        // Start the app
        initApp();
    </script>
</body>
</html>
